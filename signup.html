<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Terminal.AI</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h1>Create an account</h1>
                <p>Start your financial intelligence journey</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="username" class="form-input" placeholder="name@company.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    Create Account
                </button>
            </form>

            <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem;">
                <p style="color: var(--text-muted);">
                    Already have an account? <a href="./index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
