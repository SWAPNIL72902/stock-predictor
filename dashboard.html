<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | StockPredict SaaS</title>

    <!-- ✅ FIX -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">StockPredict</div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" class="nav-link active">Dashboard</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h2>Overview</h2>
            </header>

            <div class="card" style="margin-bottom: 2rem;">
                <input type="text" id="ticker" class="form-input" placeholder="e.g. AAPL">
                <button id="predict-btn" class="btn btn-primary">Predict</button>
            </div>

            <div id="result-card" class="card hidden">
                <h3>Prediction</h3>
                <div id="badge"></div>
                <div id="confidence-val"></div>
            </div>

            <canvas id="stockChart"></canvas>
            <div id="alert-box" class="alert alert-error hidden"></div>
        </main>
    </div>

    <!-- ✅ FIX -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = '/';
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/';
        });
    </script>
</body>
</html>
