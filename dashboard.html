<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal.AI | Neural Intelligence</title>
    
    <!-- Stable Frontend Assets -->
    <link rel="stylesheet" href="./style.css">
    
    <!-- Dependencies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Background Canvas (Neural Dotted Surface) -->
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <form id="search-form" class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search Ticker (e.g. RELIANCE.NS, TSLA, AAPL)" autocomplete="off" required>
            <button type="submit" class="predict-btn">Predict</button>
        </form>

        <!-- DASHBOARD HEADER -->
        <header class="dashboard-header">
            <div class="node-info">
                <span class="node-status">Active Intelligence Node</span>
                <h2 id="active-id">RELIANCE.NS</h2>
            </div>
            <div class="price-display">
                <span class="price-label">Current Live Price</span>
                <div id="live-price" class="price-value">Loading...</div>
            </div>
        </header>

        <!-- MAIN DASHBOARD GRID -->
        <div class="dashboard-grid">
            
            <!-- LEFT PANEL -->
            <div class="panel-left">
                <!-- Neural Recommendation Tier (Spotlight Effect) -->
                <div class="glow-card">
                    <div class="card-content">
                        <span class="section-title">Neural Recommendation</span>
                        <div id="prediction-badge" class="prediction-val val-up">...</div>
                        
                        <div style="margin-top: 1.5rem; text-align: left;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 0.5rem;">
                                <span style="color: var(--text-muted);">AI INFERENCE CONFIDENCE</span>
                                <span id="conf-pct">--%</span>
                            </div>
                            <div class="confidence-track">
                                <div id="conf-bar" class="confidence-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Intelligence Feed (Spotlight Effect) -->
                <div class="glow-card">
                    <div class="card-content">
                        <span class="section-title">Intelligence Feed</span>
                        <div id="news-list">
                            <p style="color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 1rem;">Establishing Intelligence Stream...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glow-card chart-card">
                <div class="card-content" style="height:100%; display:flex; flex-direction:column;">
                    <span class="section-title">Market Analysis (30D)</span>
                    <div class="chart-container">
                        <canvas id="market-chart"></canvas>
                    </div>
                </div>
            </div>

        </div>

        <!-- REFRESH STATUS -->
        <div class="refresh-indicator">
            <div class="pulse-dot"></div>
            Sync in: <span id="countdown">60</span>s
        </div>
    </div>

    <!-- Core Driver -->
    <script src="./script.js"></script>
</body>
</html>
