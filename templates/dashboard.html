<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AI Stock Intelligence</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                    <polyline points="17 6 23 6 23 12"></polyline>
                </svg>
                Terminal.AI
            </div>
            <nav>
                <a href="/dashboard" class="nav-link active">Dashboard</a>
                <a href="/analytics" class="nav-link">Analytics</a>
                <a href="/settings" class="nav-link">Settings</a>
                <a href="#" id="logoutBtn" class="nav-link" style="color: var(--danger); margin-top: 2rem;">Disconnect</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <h1 style="font-size: 1.25rem; font-weight: 800;">AI Stock Intelligence Dashboard</h1>
                <form id="predictForm" class="search-form">
                    <input type="text" id="tickerInput" class="form-input" placeholder="RELIANCE.NS, TSLA, AAPL" value="AAPL" autocomplete="off" required>
                    <button type="submit" id="predictBtn" class="btn btn-primary">
                        <span id="btnText">Run Neural Forecast</span>
                    </button>
                </form>
            </header>

            <!-- Error Box -->
            <div id="errorBox" class="alert hidden" style="margin-bottom: 2rem;"></div>

            <!-- Loader State -->
            <div id="loader" class="loader-container hidden">
                <div class="spinner"></div>
                <p style="color: var(--text-muted); font-size: 0.875rem;">SCANNING NEURAL NODES...</p>
            </div>

            <!-- Results Dashboard (Hidden when loading) -->
            <div id="dashboardHeader" class="card hidden fade-in" style="display: flex; justify-content: space-between; padding: 1.5rem 2.5rem;">
                <div style="display: flex; gap: 4rem;">
                    <div>
                        <span style="color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Node ID</span>
                        <h2 id="activeTicker" style="font-size: 1.5rem; font-weight: 900;">AAPL</h2>
                    </div>
                    <div>
                        <span style="color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Current Price</span>
                        <h2 id="lastPrice" style="font-size: 1.5rem; font-weight: 900;">$ --.--</h2>
                    </div>
                </div>
                <div style="text-align: right;">
                    <span style="color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem; display: block;">Sentiment</span>
                    <span id="sentLabel" class="sentiment-badge sent-neu">Neutral</span>
                </div>
            </div>

            <div id="resultsGrid" class="hidden" style="display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem;">
                <!-- Left Column -->
                <div class="fade-in">
                    <div class="card">
                        <h3 class="card-title">Recommendation</h3>
                        <div style="text-align: center; padding: 1rem 0;">
                            <div id="predictionBadge" class="prediction-badge badge-up">...</div>
                            <div style="margin-top: 1.5rem; text-align: left;">
                                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 0.5rem;">
                                    <span>AI CONFIDENCE</span>
                                    <span id="confidencePct">0%</span>
                                </div>
                                <div class="progress-track"><div id="confidenceBar" class="progress-bar" style="width: 0%"></div></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="card-title">Intelligence Feed</h3>
                        <div id="newsList"></div>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="card fade-in" style="min-height: 480px; display: flex; flex-direction: column;">
                    <h3 class="card-title">30D Performance Visualization</h3>
                    <div style="flex: 1; position: relative;">
                        <canvas id="stockChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Final Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
