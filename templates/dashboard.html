<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Intelligence | Dashboard</title>
    
    <!-- Stable Frontend Assets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Subtle Animated Background -->
    <div class="bg-animate"></div>

    <div class="container container-dashboard">
        <header>
            <h1>AI Stock Intelligence Dashboard</h1>
            <p>Real-time prediction + neural sentiment analysis</p>
            
            <form id="predict-form" class="search-section">
                <input type="text" id="ticker-input" class="input-field" placeholder="Enter Stock Ticker (e.g. AAPL)" value="AAPL" autocomplete="off" autofocus required>
                <button type="submit" id="predict-btn" class="btn-predict">
                    <span id="btn-text">Run Neural Forecast</span>
                </button>
            </form>
        </header>

        <!-- Loader State -->
        <div id="loader" class="loader-container hidden">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 700; letter-spacing: 2px;">SCANNING NEURAL NODES...</p>
        </div>

        <!-- Notification Center (Errors) -->
        <div id="error-box" class="glass-card hidden" style="text-align: center; color: var(--neon-red); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05);"></div>

        <!-- Dashboard Result Section -->
        <div id="results-area" class="hidden fade-in">
            <!-- Institutional Stock Status -->
            <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 3rem;">
                <div style="display: flex; gap: 4rem;">
                    <div>
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Node Identification</span>
                        <h2 id="active-id" style="font-size: 1.5rem; font-weight: 900;">AAPL</h2>
                    </div>
                    <div>
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Current Live Price</span>
                        <h2 id="last-price" style="font-size: 1.5rem; font-weight: 900;">$ --.--</h2>
                    </div>
                </div>
            </div>

            <div class="result-grid">
                <!-- Data Visual Column -->
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="glass-card">
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Neural recommendation</span>
                        <div id="prediction-badge" class="prediction-val">...</div>
                        
                        <div style="margin-top: 1.5rem;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; margin-bottom: 0.5rem;">
                                <span>AI INFERENCE CONFIDENCE</span>
                                <span id="conf-pct">0%</span>
                            </div>
                            <div class="confidence-track">
                                <div id="conf-bar" class="confidence-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="glass-card">
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1.5rem; display: block;">Economic Intelligence List</span>
                        <div id="news-list"></div>
                    </div>
                </div>

                <!-- Analysis Column -->
                <div class="glass-card" style="display: flex; flex-direction: column; min-height: 520px;">
                    <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1.5rem; display: block;">30D Historical Performance Map</span>
                    <div style="flex: 1; position: relative;">
                        <canvas id="stock-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 3rem;">
            <a href="#" id="logout-btn" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none; font-weight: 700;">Disconnect Terminal</a>
        </div>
    </div>

    <!-- Correct Frontend Driver -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('token')) window.location.href = '/';
            // Trigger default load
            setTimeout(() => runPrediction(), 300);
        });

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/';
        });
    </script>
</body>
</html>
