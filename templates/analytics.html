<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Analytics | StockPredict</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">StockPredict</div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="/dashboard" class="nav-link">Dashboard</a></li>
                <li class="nav-item"><a href="/analytics" class="nav-link active">Analytics</a></li>
                <li class="nav-item"><a href="/settings" class="nav-link">Settings</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="nav-link" style="color: var(--danger);">Logout</a>
            </div>
        </aside>
        <main class="main-content">
            <header><h2>Data Analytics</h2></header>
            <div class="card">
                <h3 class="card-title">Performance Analytics</h3>
                <p style="color: var(--text-muted);">Coming soon: Historical performance, backtesting reports, and portfolio distribution views.</p>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault(); localStorage.removeItem('token'); window.location.href = '/';
        });
    </script>
</body>
</html>
