<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Terminal.AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="card auth-card fade-in">
            <div class="auth-header">
                <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                        <polyline points="17 6 23 6 23 12"></polyline>
                    </svg>
                    Terminal.AI
                </div>
                <h1>Create an account</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Join the next generation of stock analysis.</p>
            </div>

            <div id="authAlert" class="alert hidden"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label">Terminal ID</label>
                    <input type="text" name="username" class="form-input" placeholder="Desired Username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Establish Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="spinner hidden"></span>
                    <span class="btn-text-content">Get Started</span>
                </button>
            </form>

            <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted);">
                Already have an account? <a href="/" style="color: var(--primary); text-decoration: none;">Sign in</a>
            </p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
