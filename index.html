<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Terminal.AI</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h1 style="color: var(--primary); font-weight: 900; letter-spacing: -1px;">Terminal.AI</h1>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Enter your secure identity to access the terminal.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Identity ID</label>
                    <input type="text" name="username" class="form-input" placeholder="Desired Username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Establish Security Key</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    Access Dashboard
                </button>
            </form>

            <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-muted);">
                Unauthorized node? <a href="./signup.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Establish Connection</a>
            </p>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
